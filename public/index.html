<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Digital Gaming Identity</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #ui {
      padding: 14px 0 10px;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    #uiInner {
      width: min(1064px, calc(100vw - 196px));
      margin: 0 auto;
    }

    #row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    #rowLabel {
      font-size: 14px;
      color: #222;
      white-space: nowrap;
      line-height: 1;
    }

    #profile {
      width: 100%;
      min-width: 0;
      height: 36px;
      padding: 0 12px;
      border-radius: 9px;
      border: 1px solid rgba(0,0,0,0.16);
      outline: none;
      box-sizing: border-box;
      font-size: 14px;
      background: #fff;
    }

    #go {
      height: 36px;
      min-width: 96px;
      padding: 0 16px;
      border-radius: 9px;
      border: 1px solid rgba(0,0,0,0.16);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    #go:hover {
      background: #fafafa;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(0,0,0,0.58);
    }

    #canvasWrap {
      padding: 6px 12px 12px;
      box-sizing: border-box;
    }

    #canvasWrap canvas {
      display: block;
      margin: 0 auto;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      background: #f5f5f5;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="ui">
      <div id="uiInner">
        <div id="row">
          <div id="rowLabel">Steam profile link:</div>
          <input
            id="profile"
            placeholder="https://steamcommunity.com/id/xxx or /profiles/7656..."
          />
          <button id="go">Generate</button>
        </div>

        <div class="hint" id="hintText">
          Paste a Steam profile link and click Generate.
        </div>
      </div>
    </div>

    <div id="canvasWrap"></div>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
